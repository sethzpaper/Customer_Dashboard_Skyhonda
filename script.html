
<script>
document.addEventListener('DOMContentLoaded', () => {

    // --- STATE MANAGEMENT ---
    const state = {
        isLoggedIn: false,
        currentView: 'dashboard',
        data: { // This will hold all data from Google Sheets
            dashboardSummary: {},
            recentSurveys: [],
            customers: [],
            users: [],
            faq: [],
            salespersons: []
        },
        reportData: [],
    };

    // --- ICONS (unchanged) ---
    const icons = { /* ... icon svg strings ... */ };
    const sidebarMenu = { /* ... sidebar menu config ... */ };

    // --- DOM ELEMENTS ---
    const mainContent = document.getElementById('main-content');
    const headerAuthSection = document.getElementById('header-auth-section');
    const loginModal = document.getElementById('login-modal');
    const loginModalClose = document.getElementById('login-modal-close');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const sidebarLinks = document.querySelectorAll('.sidebar-link');
    const adminOnlyLinks = document.querySelectorAll('.admin-only');
    const loader = document.getElementById('loader');

    // --- UI UTILITIES ---
    const showLoader = () => loader.style.display = 'block';
    const hideLoader = () => loader.style.display = 'none';

    // --- RENDER FUNCTIONS (now accept data as arguments) ---
    
    const renderDashboard = (data) => {
        const { dashboardSummary, recentSurveys } = data;
        const statusColors = { 'แก้ไขแล้ว': 'bg-green-900 text-green-300', 'กำลังดำเนินการ': 'bg-yellow-900 text-yellow-300', 'เปิดอยู่': 'bg-red-900 text-red-300' };
        
        return `
            <div class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="bg-gray-800 rounded-xl shadow-lg p-6 flex items-center"><div><p class="text-3xl font-bold text-white">${dashboardSummary.satisfactionScore || 0}</p><p class="text-sm font-medium text-gray-400">คะแนนความพอใจรวม</p></div></div>
                    <div class="bg-gray-800 rounded-xl shadow-lg p-6 flex items-center"><div><p class="text-3xl font-bold text-white">${dashboardSummary.nps || 0}</p><p class="text-sm font-medium text-gray-400">NPS Score</p></div></div>
                    <div class="bg-gray-800 rounded-xl shadow-lg p-6 flex items-center"><div><p class="text-3xl font-bold text-white">${dashboardSummary.followUps || 0}</p><p class="text-sm font-medium text-gray-400">เคสต้องติดตาม</p></div></div>
                </div>
                <div class="lg:col-span-2"><div class="bg-gray-800 rounded-xl shadow-lg p-6"><h3 class="text-lg font-semibold text-white mb-4">5 การประเมินล่าสุด</h3><div class="overflow-x-auto"><table class="min-w-full"><thead class="border-b border-gray-700"><tr><th class="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase">CustomerID</th><th class="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase">ประเภทปัญหา</th><th class="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase">สถานะ</th></tr></thead><tbody class="divide-y divide-gray-700">${recentSurveys.map(s => `<tr class="hover:bg-gray-700"><td class="px-4 py-4 text-sm font-medium text-white">${s.CustomerID}</td><td class="px-4 py-4 text-sm text-gray-300">${s.Complaint_Type || 'N/A'}</td><td class="px-4 py-4"><span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${statusColors[s.Status]}">${s.Status}</span></td></tr>`).join('')}</tbody></table></div></div></div>
            </div>`;
    };

    const renderSurveyForm = () => { /* ... unchanged ... */ return `<p>Survey form goes here.</p>`; };
    
    const renderCustomerManagement = (customers) => {
       return `<div class="space-y-6"><h1 class="text-3xl font-bold text-white">จัดการลูกค้า</h1><div class="bg-gray-800 rounded-lg shadow-lg p-6"><div class="overflow-x-auto"><table class="min-w-full"><thead class="border-b border-gray-700"><tr><th class="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase">ชื่อลูกค้า</th><th class="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase">รุ่นรถ</th></tr></thead><tbody class="divide-y divide-gray-700">${customers.map(c => `<tr class="hover:bg-gray-700"><td class="px-4 py-4 text-sm font-medium text-white">${c.FullName}</td><td class="px-4 py-4 text-sm text-gray-300">${c.CarModel}</td></tr>`).join('')}</tbody></table></div></div></div>`;
    };

    const renderReports = (salespersons) => {
        const salesOptions = salespersons.map(s => `<option value="${s.SalespersonID}">${s.SalespersonName}</option>`).join('');
        return `
            <div class="space-y-6">
                <h1 class="text-3xl font-bold text-white">สร้างรายงาน</h1>
                
                <!-- Filters -->
                <div id="report-filters" class="bg-gray-800 rounded-lg shadow-lg p-6">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                        <div>
                            <label for="start-date" class="block text-sm font-medium text-gray-300">วันที่เริ่มต้น</label>
                            <input type="date" id="start-date" class="mt-1 block w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md text-white">
                        </div>
                        <div>
                            <label for="end-date" class="block text-sm font-medium text-gray-300">วันที่สิ้นสุด</label>
                            <input type="date" id="end-date" class="mt-1 block w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md text-white">
                        </div>
                        <div>
                            <label for="salesperson-select" class="block text-sm font-medium text-gray-300">พนักงานขาย</label>
                            <select id="salesperson-select" class="mt-1 block w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md text-white">
                                <option value="all">ทั้งหมด</option>
                                ${salesOptions}
                            </select>
                        </div>
                        <button id="generate-report-btn" class="px-4 py-2 text-white bg-blue-600 rounded-lg hover:bg-blue-700 h-10">สร้างรายงาน</button>
                    </div>
                </div>

                <!-- Report Results -->
                <div id="report-results-container" class="bg-gray-800 rounded-lg shadow-lg p-6">
                    <div id="printable-area">
                        <h2 class="text-xl font-semibold text-white mb-4">ผลการรายงาน</h2>
                        <div id="report-table-container" class="overflow-x-auto">
                            <!-- Table will be injected here -->
                            <p class="text-gray-400">กรุณากรองข้อมูลเพื่อสร้างรายงาน</p>
                        </div>
                    </div>
                    <div id="print-button-container" class="text-right mt-4">
                       <button id="print-report-btn" class="px-4 py-2 text-white bg-green-600 rounded-lg hover:bg-green-700 hidden">พิมพ์รายงาน</button>
                    </div>
                </div>
            </div>`;
    };

    const renderUserManagement = (users) => { /* ... */ return `<p>User management</p>` };
    const renderHelpCenter = (faq) => { /* ... */ return `<p>Help center</p>` };
    const renderSettings = () => { /* ... */ return `<p>Settings</p>` };
    
    // Main render function to switch views
    const renderView = () => {
        const { data } = state;
        mainContent.innerHTML = ''; // Clear content before rendering
        switch (state.currentView) {
            case 'survey-forms': mainContent.innerHTML = renderSurveyForm(); break;
            case 'customers': mainContent.innerHTML = renderCustomerManagement(data.customers); break;
            case 'reports': 
                mainContent.innerHTML = renderReports(data.salespersons); 
                addReportEventListeners(); // Add listeners after rendering
                break;
            case 'users': mainContent.innerHTML = renderUserManagement(data.users); break;
            case 'help': mainContent.innerHTML = renderHelpCenter(data.faq); break;
            case 'settings': mainContent.innerHTML = renderSettings(); break;
            case 'dashboard':
            default: mainContent.innerHTML = renderDashboard(data); break;
        }
    };

    // --- UI UPDATE FUNCTION ---
    const updateUI = () => {
        // ... header and sidebar logic (unchanged) ...
        renderView();
    };

    // --- EVENT HANDLERS ---
    const handleGenerateReport = () => {
        const filters = {
            startDate: document.getElementById('start-date').value,
            endDate: document.getElementById('end-date').value,
            salespersonId: document.getElementById('salesperson-select').value
        };
        showLoader();
        google.script.run
            .withSuccessHandler(reportData => {
                state.reportData = reportData;
                const container = document.getElementById('report-table-container');
                const printBtn = document.getElementById('print-report-btn');
                if (reportData && reportData.length > 0) {
                    const headers = Object.keys(reportData[0]);
                    container.innerHTML = `
                        <table class="min-w-full">
                            <thead class="border-b border-gray-700">
                                <tr>${headers.map(h => `<th class="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase">${h}</th>`).join('')}</tr>
                            </thead>
                            <tbody class="divide-y divide-gray-700">
                                ${reportData.map(row => `<tr>${headers.map(h => `<td class="px-4 py-4 text-sm text-white">${row[h]}</td>`).join('')}</tr>`).join('')}
                            </tbody>
                        </table>`;
                    printBtn.classList.remove('hidden');
                } else {
                    container.innerHTML = `<p class="text-gray-400">ไม่พบข้อมูลตามเงื่อนไขที่เลือก</p>`;
                    printBtn.classList.add('hidden');
                }
                hideLoader();
            })
            .withFailureHandler(err => {
                console.error('Failed to get report data:', err);
                hideLoader();
                alert('เกิดข้อผิดพลาดในการดึงข้อมูลรายงาน');
            })
            .getReportData(filters);
    };

    const addReportEventListeners = () => {
        document.getElementById('generate-report-btn').addEventListener('click', handleGenerateReport);
        document.getElementById('print-report-btn').addEventListener('click', () => window.print());
    };

    // ... Other handlers (handleSidebarClick, handleLoginSubmit, handleLogout) remain largely the same ...
    const handleSidebarClick = (e) => {
        e.preventDefault();
        const link = e.target.closest('.sidebar-link');
        if (link && link.dataset.view) {
            state.currentView = link.dataset.view;
            updateUI();
        }
    };

    // --- DATA LOADING ---
    const loadInitialData = () => {
        showLoader();
        google.script.run
            .withSuccessHandler(initialData => {
                state.data = initialData;
                hideLoader();
                updateUI(); // Initial render with real data
            })
            .withFailureHandler(err => {
                console.error('Failed to load initial data:', err);
                hideLoader();
                mainContent.innerHTML = `<p class="text-red-500">เกิดข้อผิดพลาดในการโหลดข้อมูล αρχิกา กรุณาตรวจสอบการตั้งค่า Spreadsheet ID ในไฟล์ Code.gs และลองอีกครั้ง</p>`;
            })
            .getInitialData();
    };

    // --- INITIALIZATION ---
    sidebarLinks.forEach(link => link.addEventListener('click', handleSidebarClick));
    // ... login modal listeners ...
    
    // Initial data load and render
    loadInitialData();
});
</script>
